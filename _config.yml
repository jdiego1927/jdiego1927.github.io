lang:                  en
logo:                  /assets/img/mon.jpg
title:                 Juandiego Saavedra-Ordonez
tag-line:              Physics Engineer | Data Scientist | Data Analyst
description:           Portfolio of Data Science and Machine Learning projects
menu:
  - title: Personal Blog
    url:   /blog/
  - title: Projects
    url:   /projects/
  - title: Resume
    url:   /resume/
    
social:
  email: jdiego1906@gmail.com
  github: https://github.com/jdiego1927
  linkedin: https://www.linkedin.com/in/juandiego-saavedra-a7a813272/
copyright:             © 2024. All rights reserved.

accent_image:          /assets/img/red_black_bg.jpg
accent_color:          rgb(79,177,186)
theme_color:           rgb(25,55,71)

google_fonts:          false

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-seo-tag

hydejack:
  post_addons:         [about, newsletter, related, random, comments]
  project_addons:      [about, newsletter, other, comments]

  no_mark_external:    false
  no_push_state:       false
  no_drawer:           false
  no_navbar:           false
  no_search:           false
  no_inline_css:       false
  no_page_style:       false
  no_break_layout:     true
  no_toc:              false
  no_third_column:     false
  no_large_headings:   false
  no_structured_data:  false
  no_theme_color:      false
  no_breadcrumbs:      false

  use_lsi:             true
  cookies_banner:      true
  advertise:           true
  hide_dates:          false
  hide_last_modified:  false

  dark_mode:
    always:            false
    dynamic:           true
    sunrise:           6
    sunset:            18
    icon:              true

  offline:
    enabled:           false
    cache_version:     1
    precache_assets:
      - /assets/img/swipe.svg

optional_front_matter:
  remove_originals:    true

readme_index:
  remove_originals:    true
  with_frontmatter:    true

relative_links:
  collections:         true

titles_from_headings:
  strip_title:         true
  collections:         true

compress_html:
  comments:            ["<!-- ", " -->"]
  clippings:           all
  endings:             all
  ignore:
    envs:              [development]

sass:
  style:               compressed
